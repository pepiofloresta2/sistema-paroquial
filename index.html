<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Paroquial</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@media print {
  body * { visibility: hidden; }
  #doc, #doc * { visibility: visible; }

  #doc {
    position: absolute;
    top: 0;
    left: 0;
    width: 190mm;
    background: white;
  }
}
</style>
</head>

<!-- SUBSTITUA TODO O <body> PELO CÓDIGO ABAIXO -->

<body class="bg-slate-100 min-h-screen">

<!-- HEADER -->
<header class="bg-slate-900 text-white p-5 shadow-lg">

    <div class="max-w-7xl mx-auto flex items-center justify-between">

        <div class="flex items-center gap-4">

            <img
                src="assets/logo.png"
                class="w-14 h-14 object-contain"
            >

            <div>

                <h1 class="text-2xl font-bold">
                    Sistema Paroquial
                </h1>

                <p class="text-sm text-slate-300">
                    Gestão Paroquial
                </p>

            </div>

        </div>

        <div class="text-right text-sm text-slate-300">

            <div id="dataHoje"></div>

        </div>

    </div>

</header>

<!-- DASHBOARD -->
<section
    id="dashboard"
    class="max-w-7xl mx-auto p-6"
>

<!-- KPIs -->
<div class="grid md:grid-cols-4 gap-5 mb-8">

    <div class="bg-white rounded-3xl p-6 shadow-xl">

        <div class="text-sm text-slate-500 mb-2">
            Dizimistas
        </div>

        <div
            id="kpiDizimistas"
            class="text-4xl font-bold"
        >
            0
        </div>

    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl">

        <div class="text-sm text-slate-500 mb-2">
            Entradas
        </div>

        <div
            id="kpiEntradas"
            class="text-4xl font-bold text-green-600"
        >
            R$ 0,00
        </div>

    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl">

        <div class="text-sm text-slate-500 mb-2">
            Saídas
        </div>

        <div
            id="kpiSaidas"
            class="text-4xl font-bold text-red-600"
        >
            R$ 0,00
        </div>

    </div>

    <div class="bg-white rounded-3xl p-6 shadow-xl">

        <div class="text-sm text-slate-500 mb-2">
            Saldo
        </div>

        <div
            id="kpiSaldo"
            class="text-4xl font-bold text-blue-600"
        >
            R$ 0,00
        </div>

    </div>

</div>   

    <div class="grid md:grid-cols-3 gap-6">

        <!-- CARD DIZIMISTAS -->
        <div
            onclick="abrirTela('telaDizimistas')"
            class="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:scale-105 duration-200"
        >

            <div class="text-5xl mb-5">
                👥
            </div>

            <h2 class="text-2xl font-bold mb-2">
                Dizimistas
            </h2>

            <p class="text-slate-500">
                Cadastro, edição e busca
            </p>

        </div>

        <!-- CARD LANÇAMENTOS -->
        <div
            onclick="abrirTela('telaLancamentos')"
            class="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:scale-105 duration-200"
        >

            <div class="text-5xl mb-5">
                💰
            </div>

            <h2 class="text-2xl font-bold mb-2">
                Lançamentos
            </h2>

            <p class="text-slate-500">
                Entradas e saídas
            </p>

        </div>

        <!-- CARD RELATÓRIOS -->
        <div
            onclick="abrirTela('telaRelatorios')"
            class="bg-white rounded-3xl shadow-xl p-8 cursor-pointer hover:scale-105 duration-200"
        >

            <div class="text-5xl mb-5">
                📄
            </div>

            <h2 class="text-2xl font-bold mb-2">
                Relatórios
            </h2>

            <p class="text-slate-500">
                Financeiro e dízimo
            </p>

        </div>

    </div>

</section>

<!-- 🔵 TELA DIZIMISTAS -->
<section
    id="telaDizimistas"
    class="hidden max-w-7xl mx-auto p-6"
>

    <div class="flex justify-between items-center mb-6">

        <h2 class="text-3xl font-bold">
            Dizimistas
        </h2>

        <button
            onclick="voltarDashboard()"
            class="border px-5 py-3 rounded-xl"
        >
            ← Voltar
        </button>

    </div>

    <div
        class="bg-white rounded-3xl shadow-xl p-6"
    >

        <div id="listaDizimistasCadastro"></div>

    </div>

</section>

<!-- 🔵 TELA LANÇAMENTOS -->
<section
    id="telaLancamentos"
    class="hidden max-w-4xl mx-auto p-6"
>

    <div class="flex justify-between items-center mb-6">

        <h2 class="text-3xl font-bold">
            Lançamentos
        </h2>

        <button
            onclick="voltarDashboard()"
            class="border px-5 py-3 rounded-xl"
        >
            ← Voltar
        </button>

    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6">

        <div class="grid md:grid-cols-2 gap-4">

            <input id="data" type="date" class="border p-3 rounded-xl">

            <select id="tipo" class="border p-3 rounded-xl">
                <option>Entrada</option>
                <option>Saída</option>
            </select>

            <select id="categoria" class="border p-3 rounded-xl">
                <option>Dízimo</option>
                <option>Doação</option>
                <option>Outros</option>
            </select>

            <select id="forma" class="border p-3 rounded-xl">
                <option>Dinheiro</option>
                <option>PIX</option>
            </select>

            <input
                id="buscaNome"
                placeholder="Buscar dizimista"
                oninput="UI.buscarPorNome()"
                onkeydown="UI.navegarSugestoes(event)"
                class="border p-3 rounded-xl"
            >

            <div
                id="sugestoes"
                class="border rounded-xl bg-white max-h-40 overflow-y-auto"
            ></div>

            <input
                id="codigo"
                placeholder="Código"
                readonly
                class="border p-3 rounded-xl bg-slate-100"
            >

            <input
                id="nomeLanc"
                placeholder="Nome"
                readonly
                class="border p-3 rounded-xl bg-slate-100"
            >

            <input
                id="valor"
                placeholder="Valor"
                class="border p-3 rounded-xl"
            >

        </div>

        <button
            onclick="Lancamentos.adicionar()"
            class="mt-6 bg-slate-900 text-white px-6 py-4 rounded-2xl"
        >
            Salvar Lançamento
        </button>

    </div>

</section>

<!-- 🔵 TELA RELATÓRIOS -->
<section
    id="telaRelatorios"
    class="hidden max-w-7xl mx-auto p-6"
>

    <div class="flex justify-between items-center mb-6">

        <h2 class="text-3xl font-bold">
            Relatórios
        </h2>

        <button
            onclick="voltarDashboard()"
            class="border px-5 py-3 rounded-xl"
        >
            ← Voltar
        </button>

    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6">

        <input
            type="month"
            id="mesFiltro"
            class="border p-3 rounded-xl mb-5"
        >

        <div class="flex flex-wrap gap-3 mb-6">

            <button
                onclick="Relatorio.gerar()"
                class="bg-slate-900 text-white px-5 py-3 rounded-xl"
            >
                Financeiro
            </button>

            <button
                onclick="RelatorioDizimistas.gerar()"
                class="border px-5 py-3 rounded-xl"
            >
                Dízimo
            </button>

            <button
                onclick="UI.imprimir()"
                class="border px-5 py-3 rounded-xl"
            >
                PDF
            </button>

        </div>

        <div id="res"></div>

    </div>

</section>

<!-- MODAL FORM DIZIMISTA -->
<div
    id="modalFormDizimista"
    class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center"
>

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl p-6">

        <div class="flex justify-between items-center mb-6">

            <h2
                id="tituloModalDizimista"
                class="text-2xl font-bold"
            >
                Novo Dizimista
            </h2>

            <button
                onclick="Dizimistas.fecharForm()"
                class="text-3xl"
            >
                ×
            </button>

        </div>

        <input type="hidden" id="codigoAntigo">

        <div class="space-y-4">

            <input
                id="formCodigo"
                class="w-full border rounded-xl p-3"
                placeholder="Código"
            >

            <input
                id="formNome"
                class="w-full border rounded-xl p-3"
                placeholder="Nome"
            >

            <input
                id="formTel"
                class="w-full border rounded-xl p-3"
                placeholder="Telefone"
                oninput="UI.mascaraTelefone(this)"
            >

        </div>

        <div class="flex justify-end gap-3 mt-8">

            <button
                onclick="Dizimistas.fecharForm()"
                class="border px-5 py-3 rounded-xl"
            >
                Cancelar
            </button>

            <button
                onclick="Dizimistas.salvar()"
                class="bg-slate-900 text-white px-5 py-3 rounded-xl"
            >
                Salvar
            </button>

        </div>

    </div>

</div>

<script>

function abrirTela(id){

    document.getElementById("dashboard")
        .classList.add("hidden");

    document
        .querySelectorAll("section")
        .forEach(sec=>{

            if(sec.id !== "dashboard"){
                sec.classList.add("hidden");
            }
        });

    document
        .getElementById(id)
        .classList.remove("hidden");

    if(id === "telaDizimistas"){
        Dizimistas.listar();
    }
}

function voltarDashboard(){

    document
        .querySelectorAll("section")
        .forEach(sec=>{

            sec.classList.add("hidden");
        });

    document
        .getElementById("dashboard")
        .classList.remove("hidden");
}

document.getElementById("dataHoje").innerHTML =
new Date().toLocaleDateString("pt-BR");
UI.carregarDashboard();

</script>

<!-- SCRIPTS -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/dizimistas.js"></script>
<script src="js/lancamentos.js"></script>
<script src="js/relatorio.js"></script>
<script src="js/relatorio-dizimistas.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
