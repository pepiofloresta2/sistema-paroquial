<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Paroquial</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
  @media print {

      body * {
          visibility: hidden;
      }

      #area-impressao, #area-impressao * {
          visibility: visible;
      }

      #area-impressao {
          position: absolute;
          top: 0;
          left: 0;
          width: 190mm;
          background: white;
      }

  }
</style>
</head>
<body class="bg-slate-100 min-h-screen">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- Sidebar -->
  <aside class="w-full md:w-72 bg-slate-950 text-white p-5 shadow-xl">
    <div class="flex items-center gap-4 mb-8">
      <img src="assets/logo.png" alt="Logo" class="w-14 h-14 rounded-2xl bg-white p-2 object-contain">
      <h1 class="text-3xl font-bold leading-tight">
        Sistema<br>Paroquial
      </h1>
    </div>

    <div class="grid gap-4">
      <button onclick="abrirModal('modalDizimistas')"
        class="w-full text-left px-5 py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 transition text-lg font-medium">
        Cadastro de Dizimistas
      </button>

      <button onclick="abrirModal('modalLancamentos')"
        class="w-full text-left px-5 py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 transition text-lg font-medium">
        Lançamentos
      </button>

      <button onclick="abrirModal('modalRelatorios')"
        class="w-full text-left px-5 py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 transition text-lg font-medium">
        Relatórios
      </button>
    </div>
  </aside>

  <!-- Área principal -->
  <main class="flex-1 p-6 md:p-10 flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-lg p-8 w-full max-w-3xl text-center">
      <h2 class="text-3xl font-bold mb-4">Bem-vindo</h2>
      <p class="text-slate-600 text-lg">
        Selecione uma opção no menu para gerenciar o sistema paroquial.
      </p>
    </div>
  </main>

</div>

<!-- Modal Dizimistas -->
<div id="modalDizimistas" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl p-6 w-full max-w-2xl shadow-xl">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold">Cadastro de Dizimistas</h3>
      <button onclick="fecharModal('modalDizimistas')" class="text-2xl">×</button>
    </div>

    <div class="grid md:grid-cols-3 gap-4">
      <input id="dz_codigo" placeholder="Código" class="border rounded-xl p-3">
      <input id="dz_nome" placeholder="Nome" class="border rounded-xl p-3">
      <input id="dz_tel" placeholder="Telefone" class="border rounded-xl p-3">
    </div>

    <div class="mt-6 flex gap-3 flex-wrap">
      <button onclick="Dizimistas.adicionar()" class="px-5 py-3 rounded-xl bg-slate-900 text-white">
        Cadastrar
      </button>
      
    </div>

    </div>
  </div>
</div>

<!-- Modal Lançamentos -->
<div id="modalLancamentos" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl p-6 w-full max-w-3xl shadow-xl">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold">Lançamentos</h3>
      <button onclick="fecharModal('modalLancamentos')" class="text-2xl">×</button>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <input id="data" type="date" class="border rounded-xl p-3">

      <select id="tipo" class="border rounded-xl p-3">
        <option>Entrada</option>
        <option>Saída</option>
      </select>

      <select id="categoria" class="border rounded-xl p-3">
        <option>Dízimo</option>
        <option>Coleta</option>
        <option>Doação</option>
        <option>Energia</option>
        <option>Água</option>
        <option>Aluguel</option>
        <option>Outros</option>
      </select>

      <select id="forma" class="border rounded-xl p-3">
        <option>Dinheiro</option>
        <option>PIX</option>
      </select>

      <input id="buscaNome"
        placeholder="Buscar dizimista pelo nome"
        oninput="UI.buscarPorNome()"
        onkeydown="UI.navegarSugestoes(event)"
        class="border rounded-xl p-3">

      <div id="sugestoes" class="bg-white border rounded-xl shadow mt-1 max-h-40 overflow-y-auto"></div>

      <input id="codigo" placeholder="Código" readonly class="border rounded-xl p-3 bg-slate-100">
      <input id="nomeLanc" placeholder="Nome" readonly class="border rounded-xl p-3 bg-slate-100">
      <input id="valor" placeholder="Valor" class="border rounded-xl p-3">
    </div>

    <div class="mt-6">
      <button onclick="UI.lancar()" class="px-5 py-3 rounded-xl bg-slate-900 text-white">
        Lançar
      </button>
    </div>
  </div>
</div>

<!-- Modal Relatórios -->
<div id="modalRelatorios" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl p-6 w-full max-w-4xl shadow-xl">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold">Relatórios</h3>
      <button onclick="fecharModal('modalRelatorios')" class="text-2xl">×</button>
    </div>

    <input type="month" id="mesFiltro" class="border rounded-xl p-3 w-full max-w-sm">

    <div class="mt-6 flex gap-3 flex-wrap">
      <button onclick="document.getElementById('blocoListaDizimistas').classList.add('hidden'); UI.relatorio()" class="px-5 py-3 rounded-xl bg-slate-900 text-white">
        Relatório Financeiro
      </button>

      <button onclick="document.getElementById('res').innerHTML=''; Dizimistas.listar(); document.getElementById('blocoListaDizimistas').classList.remove('hidden');" class="px-5 py-3 rounded-xl border">
        Lista de Dizimistas
      </button>

      <button onclick="document.getElementById('blocoListaDizimistas').classList.add('hidden'); RelatorioDizimistas.gerar()" class="px-5 py-3 rounded-xl border">
        Relatório Dízimo
      </button>

      <button onclick="UI.imprimir()" class="px-5 py-3 rounded-xl border">
        Imprimir / Salvar PDF
      </button>
    </div>

    

    <div id="blocoListaDizimistas" class="hidden mt-8 bg-white rounded-2xl shadow p-6">
      <h4 class="text-xl font-bold mb-4 text-center">Lista de Dizimistas</h4>

      <div class="overflow-x-auto">
        <table class="w-full border-collapse text-sm md:text-base">
          
          <tbody id="listaDizimistas" class="divide-y"></tbody>
        </table>
      </div>
    </div>

    <div id="res" class="mt-8"></div>
  </div>
</div>

<script>
function abrirModal(id) {
  document.getElementById(id).classList.remove('hidden');
}

function fecharModal(id) {
  document.getElementById(id).classList.add('hidden');
}
</script>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

<script src="js/dizimistas.js"></script>
<script src="js/lancamentos.js"></script>
<script src="js/relatorio.js"></script>
<script src="js/relatorio-dizimistas.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
