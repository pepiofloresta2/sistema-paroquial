<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Paroquial</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
@media print {
  body * { visibility: hidden; }
  #doc, #doc * { visibility: visible; }

  #doc {
    position: absolute;
    top: 0;
    left: 0;
    width: 190mm;
    background: white;
  }
}
</style>
</head>

<body class="bg-slate-100 min-h-screen">

<div class="flex">

<!-- MENU -->
<aside class="w-64 bg-slate-900 text-white p-5 space-y-6 min-h-screen">

<h1 class="text-2xl font-bold">Sistema Paroquial</h1>

<div>
<h3 class="text-xs text-gray-400 uppercase mb-2">Cadastro</h3>
<button onclick="abrirModal('modalDizimistas')" class="w-full bg-slate-800 p-3 rounded-xl">
Dizimistas
</button>
</div>

<div>
<h3 class="text-xs text-gray-400 uppercase mb-2">Lançamentos</h3>
<button onclick="abrirModal('modalLancamentos')" class="w-full bg-slate-800 p-3 rounded-xl">
Entradas / Saídas
</button>
</div>

<div>
<h3 class="text-xs text-gray-400 uppercase mb-2">Relatórios</h3>
<button onclick="abrirModal('modalRelatorios')" class="w-full bg-slate-800 p-3 rounded-xl">
Relatórios
</button>
</div>

</aside>

<!-- CONTEÚDO -->
<main class="flex-1 flex items-center justify-center">
<h2 class="text-xl text-gray-500">Bem-vindo ao sistema</h2>
</main>

</div>

<!-- 🔵 MODAL DIZIMISTAS -->
<div id="modalDizimistas" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-full max-w-3xl">

<h2 class="text-xl font-bold mb-4">Cadastro de Dizimistas</h2>

<div class="grid grid-cols-3 gap-3">
<input id="dz_codigo" placeholder="Código" class="border p-2">
<input id="dz_nome" placeholder="Nome" class="border p-2">
<input id="dz_tel" placeholder="Telefone" class="border p-2">
</div>

<button onclick="Dizimistas.adicionar()" class="mt-4 bg-slate-900 text-white px-4 py-2 rounded">
Cadastrar
</button>

<div id="listaDizimistasCadastro" class="mt-6"></div>
<button onclick="fecharModal('modalDizimistas')" class="mt-4">Fechar</button>

</div>
</div>

<!-- 🔵 MODAL LANÇAMENTOS -->
<div id="modalLancamentos" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-full max-w-3xl">

<h2 class="text-xl font-bold mb-4">Lançamentos</h2>

<div class="grid grid-cols-2 gap-3">
<input id="data" type="date" class="border p-2">

<select id="tipo" class="border p-2">
<option>Entrada</option>
<option>Saída</option>
</select>

<select id="categoria" class="border p-2">
<option>Dízimo</option>
<option>Doação</option>
<option>Outros</option>
</select>

<select id="forma" class="border p-2">
<option>Dinheiro</option>
<option>PIX</option>
</select>

<input id="buscaNome"
placeholder="Buscar dizimista pelo nome"
oninput="UI.buscarPorNome()"
onkeydown="UI.navegarSugestoes(event)"
class="border p-2">

<div id="sugestoes" class="border bg-white max-h-40 overflow-y-auto"></div>

<input id="codigo" placeholder="Código" readonly class="border p-2 bg-gray-100">
<input id="nomeLanc" placeholder="Nome" readonly class="border p-2 bg-gray-100">

<input id="valor" placeholder="Valor" class="border p-2">
</div>

<button onclick="Lancamentos.adicionar()" class="mt-4 bg-slate-900 text-white px-4 py-2 rounded">
Salvar
</button>

<button onclick="fecharModal('modalLancamentos')" class="mt-4">Fechar</button>

</div>
</div>

<!-- 🔵 MODAL RELATÓRIOS -->
<div id="modalRelatorios" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
<div class="bg-white p-6 rounded-2xl w-full max-w-5xl">

<h2 class="text-xl font-bold mb-4">Relatórios</h2>

<input type="month" id="mesFiltro" class="border p-2 rounded mb-4">

<div class="flex gap-2 flex-wrap mb-4">
<button onclick="UI.limparTela(); UI.ativarBotao(this); Dizimistas.listar('res')">
Dizimistas
</button>

<button onclick="UI.limparTela(); UI.ativarBotao(this); Relatorio.gerar()">
Financeiro
</button>

<button onclick="UI.limparTela(); UI.ativarBotao(this); RelatorioDizimistas.gerar()">
Dízimo
</button>
<button onclick="UI.imprimir()" class="border px-4 py-2 rounded">PDF</button>
</div>

<div id="res"></div>

<button onclick="fecharModal('modalRelatorios')" class="mt-4">Fechar</button>

</div>
</div>

<script>
function abrirModal(id){ 
    document.getElementById(id).classList.remove('hidden'); 

    // 🔥 AQUI É O PASSO 4
    if(id === "modalDizimistas"){
        Dizimistas.listar(); // carrega lista automaticamente
    }
}

function fecharModal(id){ 
    document.getElementById(id).classList.add('hidden'); 
}
</script>

<!-- ⚠️ ORDEM CORRETA -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

<script src="js/dizimistas.js"></script>
<script src="js/lancamentos.js"></script>
<script src="js/relatorio.js"></script>
<script src="js/relatorio-dizimistas.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
